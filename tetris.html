<!doctype html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Retro Tetris</title>

  <style>
    body {
      background: radial-gradient(circle, #111, #000);
      color: white;
      text-align: center;
      font-family: Arial;
      margin: 0;
    }

    h1 {
      margin-top: 10px
    }

    #ui {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 10px;
    }

    canvas {
      background: #050505;
      border: 4px solid #00ff90;
      box-shadow: 0 0 20px #00ff90;
    }

    button {
      padding: 10px;
      margin: 4px;
      font-size: 18px;
    }

    .mobile {
      margin-top: 10px
    }
  </style>
</head>

<body>

  <h1>🧱 Retro Tetris</h1>

  <div id="ui">
    <div>Score: <span id="score">0</span></div>
    <div>Level: <span id="level">1</span></div>
    <div>Lines: <span id="lines">0</span></div>
    <div>High: <span id="high">0</span></div>
  </div>

  <canvas id="game" width="240" height="400"></canvas>

  <div class="mobile">
    <button onclick="move(-1)">⬅</button>
    <button onclick="rotatePlayer()">🔄</button>
    <button onclick="move(1)">➡</button>
    <button onclick="drop()">⬇</button>
    <button onclick="hardDrop()">⚡</button>
    <button onclick="pause()">⏸</button>
  </div>

  <div style="margin-top:10px">
    Next
    <br>
    <canvas id="next" width="80" height="80"></canvas>
  </div>

  <script>

    const canvas = document.getElementById("game")
    const ctx = canvas.getContext("2d")
    ctx.scale(20, 20)

    const scoreEl = document.getElementById("score")
    const levelEl = document.getElementById("level")
    const linesEl = document.getElementById("lines")
    const highEl = document.getElementById("high")

    const ARENA_W = 12
    const ARENA_H = 20

    const arena = createMatrix(ARENA_W, ARENA_H)

    const player = {
      pos: { x: 0, y: 0 },
      matrix: null,
      score: 0,
      lines: 0,
      level: 1
    }

    const colors = [
      null,
      "#ff595e",
      "#ffca3a",
      "#8ac926",
      "#1982c4",
      "#6a4c93",
      "#ff924c",
      "#00f5d4"
    ]

    const nextCanvas = document.getElementById("next")
    const nextCtx = nextCanvas.getContext("2d")
    nextCtx.scale(20, 20)

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)()
    const masterGain = audioCtx.createGain()
    masterGain.gain.value = 0.05
    masterGain.connect(audioCtx.destination)

    let floatingTexts = []
    let shakePower = 0
    let shakeDuration = 0
    let nextPiece = null

    function createMatrix(w, h) {
      const m = []
      while (h--) m.push(new Array(w).fill(0))
      return m
    }

    function createPiece(type) {

      if (type === "T") return [[0, 1, 0], [1, 1, 1], [0, 0, 0]]
      if (type === "O") return [[2, 2], [2, 2]]
      if (type === "L") return [[0, 3, 0], [0, 3, 0], [0, 3, 3]]
      if (type === "J") return [[0, 4, 0], [0, 4, 0], [4, 4, 0]]
      if (type === "I") return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]]
      if (type === "S") return [[0, 6, 6], [6, 6, 0], [0, 0, 0]]
      if (type === "Z") return [[7, 7, 0], [0, 7, 7], [0, 0, 0]]

    }

    function drawBlock(x, y, value) {

      ctx.fillStyle = colors[value]
      ctx.fillRect(x, y, 1, 1)

      ctx.strokeStyle = "rgba(255,255,255,0.4)"
      ctx.lineWidth = 0.05
      ctx.strokeRect(x, y, 1, 1)

    }

    function drawMatrix(matrix, offset) {

      for (let y = 0; y < matrix.length; y++) {
        for (let x = 0; x < matrix[y].length; x++) {

          const v = matrix[y][x]
          if (v !== 0) {
            drawBlock(x + offset.x, y + offset.y, v)
          }

        }
      }

    }

    function merge(arena, player) {

      for (let y = 0; y < player.matrix.length; y++) {
        for (let x = 0; x < player.matrix[y].length; x++) {

          if (player.matrix[y][x] !== 0) {
            arena[y + player.pos.y][x + player.pos.x] = player.matrix[y][x]
          }

        }
      }

    }

    function collide(arena, player) {

      const m = player.matrix
      const o = player.pos

      for (let y = 0; y < m.length; y++) {
        for (let x = 0; x < m[y].length; x++) {

          if (m[y][x] !== 0 && arena[y + o.y]?.[x + o.x] !== 0) {
            return true
          }

        }
      }

      return false

    }

    function rotate(matrix) {

      for (let y = 0; y < matrix.length; y++) {
        for (let x = 0; x < y; x++) {
          [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]]
        }
      }

      matrix.forEach(row => row.reverse())

    }

    function rotatePlayer() {

      rotate(player.matrix)

      if (collide(arena, player)) {
        rotate(player.matrix)
        rotate(player.matrix)
        rotate(player.matrix)
      }

      sound(600)

    }

    function move(dir) {

      player.pos.x += dir

      if (collide(arena, player)) {
        player.pos.x -= dir
      }

      sound(200)

    }

    function drop() {

      player.pos.y++

      if (collide(arena, player)) {

        player.pos.y--

        merge(arena, player)

        clearLines()

        reset()

      }

      dropCounter = 0

    }

    function hardDrop() {

      while (!collide(arena, player)) {
        player.pos.y++
      }

      player.pos.y--

      merge(arena, player)

      clearLines()

      reset()

      sound(120)

    }

    function reset() {

      const pieces = "ILJOTSZ"

      if (!nextPiece) {
        nextPiece = createPiece(
          pieces[(Math.random() * pieces.length) | 0]
        )
      }

      player.matrix = nextPiece

      nextPiece = createPiece(
        pieces[(Math.random() * pieces.length) | 0]
      )

      player.pos.y = 0
      player.pos.x = (ARENA_W / 2 | 0) - (player.matrix[0].length / 2 | 0)

      drawNext()

      if (collide(arena, player)) {

        arena.forEach(row => row.fill(0))

        player.score = 0
        player.lines = 0
        player.level = 1

      }

      updateUI()

    }


    function triggerShake(power, duration) {

      shakePower = power
      shakeDuration = duration

    }

    function drawNext() {

      nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height)

      nextPiece.forEach((row, y) => {
        row.forEach((v, x) => {
          if (v !== 0) {

            nextCtx.fillStyle = colors[v]
            nextCtx.fillRect(x + 1, y + 1, 1, 1)

            nextCtx.strokeStyle = "rgba(255,255,255,0.4)"
            nextCtx.strokeRect(x + 1, y + 1, 1, 1)

          }
        })
      })

    }

    function addFloatingText(text, x, y) {

      floatingTexts.push({
        text,
        x,
        y,
        alpha: 1,
        life: 60
      })

    }

    function clearLines() {

      let linesCleared = 0

      outer: for (let y = arena.length - 1; y >= 0; y--) {

        for (let x = 0; x < arena[y].length; x++) {
          if (arena[y][x] === 0) continue outer
        }

        arena.splice(y, 1)
        arena.unshift(new Array(ARENA_W).fill(0))
        y++

        linesCleared++

        player.lines++
        player.score += 100

      }

      if (linesCleared > 0) {

        const messages = {
          1: "Boa!",
          2: "Muito bom!",
          3: "Perfeito!",
          4: "TETRIS!!!"
        }

        addFloatingText(messages[linesCleared] || "Combo!", 4, 10)

        if (linesCleared === 4) {
          triggerShake(12, 20)
        } else {
          triggerShake(4 + linesCleared * 2, 10)
        }

        sound(600 + linesCleared * 100)

      }

      player.level = 1 + Math.floor(player.lines / 10)

      updateUI()

    }

    function updateUI() {

      scoreEl.innerText = player.score
      levelEl.innerText = player.level
      linesEl.innerText = player.lines

      let high = localStorage.getItem("tetrisHigh") || 0

      if (player.score > high) {
        high = player.score
        localStorage.setItem("tetrisHigh", high)
      }

      highEl.innerText = high

    }

    function draw() {

      ctx.save()

      if (shakeDuration > 0) {

        const dx = (Math.random() - 0.5) * shakePower
        const dy = (Math.random() - 0.5) * shakePower

        ctx.translate(dx, dy)

        shakeDuration--

      }

      ctx.clearRect(0, 0, canvas.width, canvas.height)

      drawMatrix(arena, { x: 0, y: 0 })
      drawGhost()
      drawMatrix(player.matrix, player.pos)

      drawFloatingTexts()

      ctx.restore()

    }

    function drawGhost() {

      let ghostY = player.pos.y

      while (!collide(arena, {
        pos: { x: player.pos.x, y: ghostY },
        matrix: player.matrix
      }) && ghostY < arena.length) {
        ghostY++
      }

      ghostY--

      ctx.globalAlpha = 0.25
      drawMatrix(player.matrix, { x: player.pos.x, y: ghostY })
      ctx.globalAlpha = 1

    }

    function drawFloatingTexts() {

      ctx.save()
      ctx.scale(0.05, 0.05)

      for (let i = floatingTexts.length - 1; i >= 0; i--) {

        const t = floatingTexts[i]

        ctx.globalAlpha = t.alpha
        ctx.fillStyle = "yellow"
        ctx.font = "bold 40px Arial"

        ctx.fillText(t.text, t.x * 20, t.y * 20)

        t.y -= 0.02
        t.alpha -= 0.02
        t.life--

        if (t.life <= 0) {
          floatingTexts.splice(i, 1)
        }

      }

      ctx.restore()

    }

    function sound(freq) {

      const osc = audioCtx.createOscillator()

      osc.type = "square"
      osc.frequency.value = freq

      osc.connect(masterGain)

      osc.start()
      osc.stop(audioCtx.currentTime + 0.08)

    }

    let dropCounter = 0
    let dropInterval = 1000
    let last = 0
    let paused = false

    function update(time = 0) {

      if (paused) return

      const delta = time - last
      last = time

      dropCounter += delta

      if (dropCounter > dropInterval / Math.max(player.level, 1)) {
        drop()
      }

      draw()

      requestAnimationFrame(update)

    }

    function pause() {

      paused = !paused

      if (!paused) {
        update()
      }

    }

    document.addEventListener("keydown", e => {

      if (e.key === "ArrowLeft") move(-1)
      if (e.key === "ArrowRight") move(1)
      if (e.key === "ArrowDown") drop()
      if (e.key === "ArrowUp") rotatePlayer()
      if (e.key === " ") hardDrop()
      if (e.key === "p") pause()

    })

    reset()
    updateUI()
    update()

  </script>

</body>

</html>
